<!-- Substitua apenas o bloco <script> do monitor.html -->
<script>
  const proto      = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl      = `${proto}://${location.host}`;
  const playerLink = `${location.origin}/jogador.html`;

  document.getElementById('player-url').textContent = playerLink;

  let qrInstance = null;
  function buildQR() {
    const wrap = document.getElementById('qrcode');
    wrap.innerHTML = '';
    qrInstance = new QRCode(wrap, {
      text: playerLink, width:160, height:160,
      colorDark:'#1a1a2e', colorLight:'#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }
  buildQR();

  let ws, totalPlayers = 0, answeredCount = 0;
  let currentOptions = [], currentCorrect = 0;

  // ✅ Guarda a posição atual de cada cavalo entre rodadas (por nome do jogador)
  const horsePositions = {};

  const HORSES = [
    '🐎','🏇','🐴','🦄','🐎','🏇','🐴','🦄',
    '🐎','🏇','🐴','🦄','🐎','🏇','🐴','🦄',
    '🐎','🏇','🐴','🦄','🐎','🏇','🐴','🦄',
    '🐎','🏇','🐴','🦄','🐎','🏇','🐴','🦄',
    '🐎','🏇','🐴','🦄','🐎','🏇','🐴','🦄'
  ];

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen    = () => ws.send(JSON.stringify({ type:'monitor_connect' }));
    ws.onmessage = e  => handle(JSON.parse(e.data));
    ws.onclose   = () => setTimeout(connect, 2000);
  }

  function handle(data) {
    if (data.type === 'state') {
      renderPlayers(data.players);
      if (data.gameCode) {
        showCode(data.gameCode);
        document.getElementById('btn-start').disabled = false;
      }
    }
    if (data.type === 'player_joined') renderPlayers(data.players);
    if (data.type === 'new_code')      showCode(data.gameCode);
    if (data.type === 'question')      showQuestion(data);
    if (data.type === 'tick')          updateTimer(data.timeLeft);
    if (data.type === 'answer_update') {
      answeredCount = data.answeredCount;
      totalPlayers  = data.totalPlayers;
      document.getElementById('q-answered').textContent = `✅ ${answeredCount}/${totalPlayers}`;
    }
    if (data.type === 'reveal')  showReveal(data);
    if (data.type === 'final')   showFinal(data.ranking);
    if (data.type === 'reset') {
      show('s-lobby');
      document.getElementById('code-display').textContent = '——';
      document.getElementById('btn-start').disabled = true;
      renderPlayers([]);
      // ✅ Limpa posições ao resetar
      Object.keys(horsePositions).forEach(k => delete horsePositions[k]);
    }
    if (data.type === 'error') toast(data.msg);
  }

  function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showCode(code) {
    document.getElementById('code-display').textContent = code;
  }

  function renderPlayers(list) {
    totalPlayers = list.length;
    document.getElementById('player-count').textContent = `👥 ${list.length} jogador(es) conectado(s)`;
    document.getElementById('players-grid').innerHTML =
      list.map(p => `<div class="p-chip">👤 ${p.name}</div>`).join('');
  }

  async function generateCode() {
    const res  = await fetch('/api/new-code', { method:'POST' });
    const data = await res.json();
    showCode(data.gameCode);
    document.getElementById('btn-start').disabled = false;
    renderPlayers([]);
    show('s-lobby');
    stopConfetti();
    // ✅ Limpa posições ao gerar nova partida
    Object.keys(horsePositions).forEach(k => delete horsePositions[k]);
    toast(`✅ Código gerado: ${data.gameCode}`);
  }

  function startGame()   { send({ type:'start_game' }); }
  function nextQ()       { send({ type:'next_question' }); }
  function forceReveal() { send({ type:'reveal_answer' }); }
  function resetGame()   { send({ type:'reset_game' }); }

  function showQuestion(d) {
    show('s-question');
    answeredCount  = 0;
    currentOptions = d.options;
    currentCorrect = d.correct;

    document.getElementById('q-num').textContent = `${d.index + 1}/${d.total}`;
    document.getElementById('q-bar').style.width = `${((d.index + 1) / d.total) * 100}%`;
    document.getElementById('q-text').textContent = d.question;
    document.getElementById('q-answered').textContent = `✅ 0/${totalPlayers}`;

    document.querySelectorAll('.opt').forEach((o, i) => {
      o.className = 'opt';
      const txt = d.options[i] || '';
      document.getElementById(`o${i}`).textContent = txt;
      o.style.display = txt ? 'flex' : 'none';
    });

    updateTimer(d.timeLimit);
  }

  function updateTimer(t) {
    const el = document.getElementById('q-timer');
    el.textContent = t;
    el.classList.toggle('urgent', t <= 5);
  }

  // ══ REVELAR ══
  function showReveal(data) {
    document.querySelectorAll('.opt').forEach((o, i) => {
      if (o.style.display === 'none') return;
      o.classList.add(i === data.correct ? 'correct' : 'wrong');
    });
    setTimeout(() => {
      show('s-race');
      document.getElementById('race-answer-text').textContent =
        data.correctText || currentOptions[data.correct] || '';
      document.getElementById('btn-next-race').style.display = 'none';
      document.getElementById('btn-next-race').textContent =
        data.isLast ? '🏆 Ver Resultado Final' : '➡️ Próxima Pergunta';
      buildRace(data.ranking || [], data.roundEarned || {});
    }, 1600);
  }

  // ══ CORRIDA ══
  // ✅ data.ranking já vem com score TOTAL acumulado
  // ✅ data.roundEarned = { "NomeJogador": pontosGanhosNestaRodada }
  //    → Se roundEarned[nome] > 0: cavalo avança
  //    → Se roundEarned[nome] === 0: cavalo FICA PARADO na posição anterior

  function buildRace(ranking, roundEarned) {
    const container = document.getElementById('race-lanes');
    container.innerHTML = '';
    if (!ranking.length) return;

    const DURATION = 3200;
    const MIN_PCT  = 2;   // posição inicial (início da pista)
    const MAX_PCT  = 88;  // posição máxima (linha de chegada)

    // Score máximo para calcular posição proporcional na pista
    const maxScore = Math.max(...ranking.map(p => p.score), 1);

    ranking.forEach((p, i) => {
      // ✅ Posição atual do cavalo (salva entre rodadas)
      const currentPos = horsePositions[p.name] ?? MIN_PCT;

      const lane = document.createElement('div');
      lane.className = 'race-lane';
      lane.innerHTML = `
        <div class="lane-label">${p.name}<small>⭐ <span id="score-count-${i}">0</span> pts</small></div>
        <div class="lane-road">
          <div class="horse-wrap" id="hw-${i}" style="left:${currentPos}%">
            <span class="horse">${HORSES[i % HORSES.length]}</span>
            <span class="pos-badge" id="pos-${i}"></span>
          </div>
        </div>`;
      container.appendChild(lane);
    });

    // Scroll pro topo
    document.querySelector('.racetrack').scrollTop = 0;

    requestAnimationFrame(() => requestAnimationFrame(() => {
      ranking.forEach((p, i) => {
        const hw      = document.getElementById(`hw-${i}`);
        const scoreEl = document.getElementById(`score-count-${i}`);
        const delay   = i * 80;

        // ✅ Exibe score atual imediatamente (sem animar do zero — já acumulado)
        if (scoreEl) scoreEl.textContent = p.score;

        const earned = roundEarned?.[p.name] ?? 0;

        if (earned > 0) {
          // ✅ Avança: posição proporcional ao score total acumulado
          const targetPct = MIN_PCT + Math.round(
            (p.score / maxScore) * (MAX_PCT - MIN_PCT) * 0.92
          );

          // Garante que nunca volta para trás
          const finalPct = Math.max(horsePositions[p.name] ?? MIN_PCT, targetPct);

          setTimeout(() => {
            hw.style.transition = `left ${DURATION}ms cubic-bezier(0.25,0.46,0.45,0.94)`;
            hw.style.left       = `${finalPct}%`;
          }, delay);

          // ✅ Salva nova posição
          horsePositions[p.name] = finalPct;

        } else {
          // ✅ Não pontuou: cavalo fica parado, sem transição
          hw.style.transition = 'none';
          hw.style.left       = `${horsePositions[p.name] ?? MIN_PCT}%`;
        }
      });

      const totalDelay = DURATION + ranking.length * 80 + 500;
      setTimeout(() => {
        updatePositionBadges(ranking);
        document.getElementById('btn-next-race').style.display = 'inline-block';
      }, totalDelay);
    }));
  }

  function updatePositionBadges(ranking) {
    const sorted = [...ranking].sort((a, b) => b.score - a.score);
    ranking.forEach((p, i) => {
      const pos   = sorted.findIndex(s => s.name === p.name) + 1;
      const badge = document.getElementById(`pos-${i}`);
      if (badge) {
        badge.textContent = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':`${pos}º`;
        badge.classList.add('show');
      }
    });
  }

  // ══ PÓDIO FINAL ══
  function showFinal(ranking) {
    show('s-final');
    stopConfetti();
    const stage = document.getElementById('podium-stage');
    const rest  = document.getElementById('podium-rest');
    stage.innerHTML = rest.innerHTML = '';

    const podiumOrder = [ranking[1], ranking[0], ranking[2]].filter(Boolean);
    const medals  = ['🥈','🥇','🥉'];
    const heights = ['110px','165px','80px'];

    podiumOrder.forEach((p, vi) => {
      const block = document.createElement('div');
      block.className = 'podium-block';
      block.innerHTML = `
        <div class="podium-avatar">${medals[vi]}</div>
        <div class="podium-name">${p.name}</div>
        <div class="podium-pts">⭐ ${p.score} pts</div>
        <div class="podium-pillar" style="height:${heights[vi]}">${vi===1?'👑':''}</div>`;
      stage.appendChild(block);
    });

    ranking.slice(3).forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'rank-row';
      row.innerHTML = `
        <div class="rank-pos">${i+4}º</div>
        <div class="rank-name">${p.name}</div>
        <div class="rank-pts">⭐ ${p.score} pts</div>`;
      rest.appendChild(row);
    });

    const blocks = stage.querySelectorAll('.podium-block');
    [2,0,1].forEach((bi, ti) => {
      setTimeout(() => {
        if (blocks[bi]) blocks[bi].classList.add('show');
        if (bi === 1) startConfetti();
      }, 400 + ti * 700);
    });
    rest.querySelectorAll('.rank-row').forEach((r, i) => {
      setTimeout(() => r.classList.add('show'), 400 + 3*700 + i*100);
    });
  }

  // ══ CONFETTI ══
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  let pieces = [], animId = null;

  function startConfetti() {
    canvas.style.display = 'block';
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    pieces = Array.from({length:180}, () => ({
      x:Math.random()*canvas.width, y:Math.random()*-canvas.height,
      r:5+Math.random()*8, d:2+Math.random()*3,
      color:`hsl(${Math.random()*360},90%,60%)`,
      tilt:Math.random()*10-5, ts:0.08+Math.random()*0.18
    }));
    (function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => {
        ctx.beginPath();
        ctx.ellipse(p.x,p.y,p.r,p.r/2,p.tilt,0,Math.PI*2);
        ctx.fillStyle = p.color; ctx.fill();
        p.y+=p.d; p.tilt+=p.ts; p.x+=Math.sin(p.tilt)*1.3;
        if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
      });
      animId = requestAnimationFrame(draw);
    })();
  }

  function stopConfetti() {
    if(animId) cancelAnimationFrame(animId);
    canvas.style.display = 'none';
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent   = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display='none', 3000);
  }

  connect();
</script>
