<script>
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}`;

  let ws, myName = '', myCode = '', myScore = 0;
  const ICONS = ['▲','◆','●','■'];

  // ✅ Token persistente no localStorage
  const TOKEN_KEY = 'quiz_player_token';

  function saveToken(token) {
    localStorage.setItem(TOKEN_KEY, token);
  }

  function loadToken() {
    return localStorage.getItem(TOKEN_KEY);
  }

  function clearToken() {
    localStorage.removeItem(TOKEN_KEY);
  }

  function connect() {
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      // ✅ Tenta reconectar automaticamente ao abrir conexão
      const token = loadToken();
      if (token) {
        send({ type: 'reconnect', token });
      }
    };

    ws.onmessage = e => handle(JSON.parse(e.data));
    ws.onclose   = () => setTimeout(connect, 2000);
  }

  function handle(data) {
    // ── Reconexão bem-sucedida ✅
    if (data.type === 'reconnected') {
      myName  = data.name;
      myScore = data.score;
      saveToken(data.token);
      toastP(`🔄 Reconectado como ${myName}! Pontos: ${myScore}`);
      show('s-wait');
      document.getElementById('wait-name').textContent = `👋 ${myName}`;
      return;
    }

    // ── Reconexão falhou (token expirado ou sala reiniciada) ✅
    if (data.type === 'reconnect_failed') {
      clearToken();
      show('s-code'); // volta para tela de código
      return;
    }

    // ── Já respondeu esta rodada (ao reconectar durante pergunta) ✅
    if (data.type === 'already_answered') {
      show('s-result');
      document.getElementById('result-icon').textContent  = '⏳';
      document.getElementById('result-title').textContent = 'Já respondido!';
      document.getElementById('result-sub').textContent   = 'Aguardando o resultado...';
      document.getElementById('result-pts').textContent   = `⭐ Total: ${myScore} pts`;
      return;
    }

    if (data.type === 'code_ok')      { show('s-join'); }
    if (data.type === 'code_invalid') { toastP('❌ Código inválido ou partida não encontrada!'); }

    if (data.type === 'joined') {
      myName = data.name;
      saveToken(data.token); // ✅ salva token recebido ao entrar
      show('s-wait');
      document.getElementById('wait-name').textContent = `👋 ${myName}`;
    }

    if (data.type === 'question')  { showQuestion(data); }
    if (data.type === 'tick')      { updateTimerP(data.timeLeft); }
    if (data.type === 'reveal')    { showResult(data); }
    if (data.type === 'game_over') { showGameOver(data.ranking); }

    if (data.type === 'kicked') {
      clearToken(); // ✅ limpa token ao ser kickado
      toastP('🔄 A sala foi reiniciada.');
      setTimeout(() => location.reload(), 2000);
    }

    if (data.type === 'error') { toastP(data.msg); }
  }

  function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function validateCode() {
    const code = document.getElementById('inp-code').value.trim();
    if (code.length < 4) { toastP('Digite o código completo!'); return; }
    myCode = code;
    send({ type: 'validate_code', code });
  }

  function joinGame() {
    const name = document.getElementById('inp-name').value.trim();
    if (!name) { toastP('Digite seu nome!'); return; }
    send({ type: 'join', name, code: myCode });
  }

  function showQuestion(d) {
    show('s-question-p');
    document.getElementById('q-counter').textContent      = `Pergunta ${d.index + 1}/${d.total}`;
    document.getElementById('q-progress-bar').style.width = `${((d.index + 1) / d.total) * 100}%`;
    document.getElementById('q-text-player').textContent  = d.question;

    // ✅ usa timeLeft se veio do servidor (reconexão), senão usa timeLimit
    updateTimerP(d.timeLeft ?? d.timeLimit);

    const grid = document.getElementById('opt-grid');
    grid.innerHTML = '';

    d.options.forEach((optText, i) => {
      if (!optText) return;
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span class="opt-icon-big">${ICONS[i]}</span><span>${optText}</span>`;
      btn.dataset.index = i;
      btn.onclick = () => answer(i, btn);
      grid.appendChild(btn);
    });
  }

  function updateTimerP(t) {
    const el = document.getElementById('q-timer-player');
    if (!el) return;
    el.textContent = t;
    if (t <= 5) el.classList.add('urgent');
    else        el.classList.remove('urgent');
  }

  function answer(opt, btnClicked) {
    send({ type: 'answer', option: opt });
    document.querySelectorAll('.opt-btn').forEach(b => {
      b.disabled = true;
      b.classList.remove('selected');
    });
    if (btnClicked) btnClicked.classList.add('selected');
  }

  function showResult(data) {
    show('s-result');
    myScore = data.score ?? myScore;
    const hit = data.hit;
    document.getElementById('result-icon').textContent  = hit ? '🎉' : '😢';
    document.getElementById('result-title').textContent = hit ? 'Correto!' : 'Errou...';
    document.getElementById('result-sub').textContent   = hit
      ? `+${data.points || 0} pontos ganhos!`
      : 'Não foi dessa vez!';
    document.getElementById('result-pts').textContent   = `⭐ Total: ${myScore} pts`;
  }

  function showGameOver(ranking) {
    clearToken(); // ✅ limpa token ao fim do jogo
    show('s-gameover');
    const list = document.getElementById('gameover-list');
    list.innerHTML = '';
    const sorted = [...ranking].sort((a, b) => b.score - a.score);
    const medals  = ['🥇','🥈','🥉'];
    sorted.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'rank-item' + (p.name === myName ? ' me' : '');
      div.innerHTML = `
        <div class="pos">${medals[i] || `${i + 1}º`}</div>
        <div class="rname">${p.name}${p.name === myName ? ' (você)' : ''}</div>
        <div class="rpts">⭐ ${p.score}</div>`;
      list.appendChild(div);
    });
  }

  function toastP(msg) {
    const t = document.getElementById('toast-p');
    t.textContent   = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  document.getElementById('inp-code').addEventListener('keydown', e => { if (e.key === 'Enter') validateCode(); });
  document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });

  connect();
</script>
